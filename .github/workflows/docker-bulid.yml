name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ] # Buduje automatycznie po pushu na main

jobs:
  build:
    runs-on: ubuntu-latest # To jest ten szybki Linux amd64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

- name: Build and push
        uses: docker/build-push-action@v5
        with:
          # context mówi: "tu są pliki źródłowe"
          context: ./Computer_Rental_APP
          # file mówi: "tu konkretnie jest mój Dockerfile"
          file: ./Computer_Rental_APP/Dockerfile
          push: true
          tags: lpiwnik/computer-rental:v1
          platforms: linux/amd64,linux/arm64
